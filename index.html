<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我已成神</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold-light: #fff0b8;
      --gold-hot: #ffd25f;
      --gold-deep: #7a4a0a;
      --text: rgba(255, 242, 213, 0.92);
      --panel: rgba(18, 10, 4, 0.78);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      color: #f9e8bd;
      background:
        radial-gradient(circle at 50% -16%, rgba(255, 230, 150, 0.34), transparent 34%),
        radial-gradient(circle at 12% 18%, rgba(209, 132, 22, 0.24), transparent 28%),
        radial-gradient(circle at 86% 20%, rgba(255, 203, 89, 0.22), transparent 32%),
        linear-gradient(180deg, #080403 0%, #160d04 48%, #030201 100%);
    }

    body::before,
    body::after,
    .gold-streams,
    .light-curtain {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      z-index: 0;
      background-image:
        linear-gradient(rgba(255, 220, 134, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 220, 134, 0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 76%);
    }

    body::after {
      z-index: 0;
      background:
        radial-gradient(circle at 18% 14%, rgba(255, 236, 180, 0.16) 0 1px, transparent 2px),
        radial-gradient(circle at 76% 28%, rgba(255, 209, 97, 0.16) 0 1px, transparent 2px),
        radial-gradient(circle at 38% 74%, rgba(255, 231, 176, 0.14) 0 1px, transparent 2px),
        radial-gradient(circle at 88% 82%, rgba(221, 166, 58, 0.16) 0 1px, transparent 2px);
      background-size: 150px 200px, 190px 170px, 220px 240px, 260px 210px;
      animation: divineDust 16s linear infinite;
    }

    .gold-streams {
      z-index: 1;
      opacity: 0.66;
      background:
        linear-gradient(105deg, transparent 8%, rgba(255, 212, 103, 0) 36%, rgba(255, 226, 147, 0.30) 48%, rgba(255, 212, 103, 0) 60%, transparent 92%),
        linear-gradient(78deg, transparent 0%, rgba(255, 205, 87, 0) 50%, rgba(255, 239, 176, 0.18) 56%, rgba(255, 205, 87, 0) 64%, transparent 100%);
      transform: translateX(-42%);
      animation: streamSweep 7s ease-in-out infinite;
    }

    .light-curtain {
      z-index: 9998;
      display: none;
      background:
        linear-gradient(90deg, transparent, rgba(255, 237, 177, 0.78), transparent),
        radial-gradient(circle at 50% 38%, rgba(255, 216, 116, 0.46), transparent 34%),
        #050302;
      animation: curtainOpen 1.45s ease forwards;
    }

    #main-content {
      display: none;
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 14px 10px 42px;
    }

    .god-shell {
      width: min(820px, 100%);
      margin: 0 auto;
      position: relative;
    }

    .god-shell::before {
      content: "";
      position: absolute;
      top: -56px;
      left: 50%;
      width: min(92vw, 560px);
      aspect-ratio: 1;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 225, 137, 0.32), rgba(255, 200, 79, 0.10) 38%, transparent 70%);
      filter: blur(4px);
      z-index: -1;
      animation: haloPulseCenter 4.4s ease-in-out infinite;
    }

    .hero-title {
      padding: 16px 8px 10px;
      text-align: center;
      animation: riseIn 0.8s ease both;
    }

    .eyebrow {
      color: rgba(255, 232, 174, 0.78);
      font-size: 11px;
      letter-spacing: 4px;
      text-indent: 4px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      position: relative;
      display: inline-block;
      color: var(--gold-light);
      font-size: clamp(42px, 13vw, 92px);
      line-height: 0.94;
      font-weight: 900;
      text-shadow:
        0 0 10px rgba(255, 225, 142, 0.94),
        0 0 28px rgba(255, 180, 47, 0.62),
        0 0 58px rgba(255, 151, 24, 0.32),
        0 8px 24px rgba(0, 0, 0, 0.88);
      animation: titlePulse 2.8s ease-in-out infinite;
    }

    h1::before,
    h1::after {
      content: "";
      position: absolute;
      top: 50%;
      width: min(12vw, 42px);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 232, 164, 0.9), transparent);
      box-shadow: 0 0 12px rgba(255, 211, 92, 0.66);
    }

    h1::before { right: calc(100% + 8px); }
    h1::after { left: calc(100% + 8px); }

    .subtitle {
      margin: 12px auto 0;
      max-width: 320px;
      color: rgba(255, 239, 205, 0.8);
      font-size: 13px;
      line-height: 1.85;
    }

    .content-text {
      position: relative;
      margin: 14px auto 0;
      width: 100%;
      padding: 24px 16px 18px;
      border: 1px solid rgba(255, 218, 135, 0.34);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 223, 148, 0.11), transparent 96px),
        linear-gradient(90deg, rgba(5, 3, 2, 0.12), var(--panel), rgba(5, 3, 2, 0.12));
      box-shadow:
        inset 0 0 0 1px rgba(255, 241, 182, 0.04),
        0 14px 36px rgba(0, 0, 0, 0.54),
        0 0 30px rgba(193, 126, 24, 0.12);
      color: var(--text);
      font-size: 14px;
      line-height: 2.02;
      word-break: break-word;
      overflow: hidden;
      animation: riseIn 0.95s 0.08s ease both;
    }

    .content-text::before,
    .content-text::after {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 218, 135, 0.7), transparent);
    }

    .content-text::before { top: 9px; }
    .content-text::after { bottom: 9px; }

    .content-text p { margin-bottom: 14px; }
    .content-text p:last-child { margin-bottom: 0; }

    .content-text p:first-child {
      color: #ffe8ae;
      font-size: 16px;
      line-height: 1.95;
      text-shadow: 0 0 14px rgba(255, 200, 86, 0.26);
    }

    .content-text p:nth-child(3) {
      color: var(--gold-light);
      text-align: center;
      font-size: clamp(22px, 7vw, 38px);
      font-weight: 900;
      line-height: 1.56;
      text-shadow: 0 0 22px rgba(255, 207, 96, 0.68), 0 4px 18px #000;
    }

    .image-wrapper {
      position: relative;
      margin: 18px auto 0;
      width: min(72%, 360px);
      border: 1px solid rgba(255, 224, 146, 0.54);
      border-radius: 8px;
      padding: 6px;
      background:
        linear-gradient(135deg, rgba(255, 241, 185, 0.30), transparent 22%, transparent 76%, rgba(183, 108, 17, 0.24)),
        rgba(10, 6, 3, 0.84);
      box-shadow:
        0 18px 44px rgba(0, 0, 0, 0.66),
        0 0 28px rgba(255, 193, 64, 0.22);
      overflow: hidden;
      animation: riseIn 1s 0.18s ease both, imageGlowSoft 4s ease-in-out infinite;
    }

    .image-wrapper::before {
      content: "";
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(255, 243, 198, 0.18);
      z-index: 2;
      pointer-events: none;
    }

    .image-wrapper::after {
      content: "";
      position: absolute;
      inset: -40%;
      z-index: 3;
      background: linear-gradient(115deg, transparent 42%, rgba(255, 245, 200, 0.34) 49%, transparent 57%);
      transform: translateX(-80%);
      animation: imageShine 6.4s ease-in-out infinite;
      pointer-events: none;
    }

    .image-wrapper img {
      width: 100%;
      display: block;
      filter: contrast(1.08) saturate(1.02) brightness(0.92);
    }

    .image-banner {
      position: absolute;
      left: 6px;
      right: 6px;
      bottom: 6px;
      z-index: 4;
      background:
        linear-gradient(90deg, rgba(6, 4, 2, 0.12), rgba(8, 5, 2, 0.88), rgba(6, 4, 2, 0.12)),
        linear-gradient(180deg, rgba(255, 218, 118, 0.15), rgba(112, 67, 12, 0.22));
      color: #ffecae;
      font-size: clamp(18px, 5.8vw, 34px);
      font-weight: 900;
      text-align: center;
      padding: 9px 8px 11px;
      text-shadow: 0 0 16px rgba(255, 206, 92, 0.82), 0 4px 16px #000;
      border-top: 1px solid rgba(255, 224, 143, 0.3);
    }

    .nailong-plaque {
      position: relative;
      margin: 16px auto 0;
      width: min(66%, 300px);
      padding: 10px;
      border: 1px solid rgba(255, 221, 139, 0.46);
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 14%, rgba(255, 221, 127, 0.18), transparent 42%),
        linear-gradient(180deg, rgba(255, 223, 142, 0.10), rgba(13, 7, 3, 0.9));
      box-shadow:
        inset 0 0 0 1px rgba(255, 242, 197, 0.06),
        0 18px 40px rgba(0, 0, 0, 0.58),
        0 0 30px rgba(255, 187, 54, 0.14);
      overflow: hidden;
      animation: riseIn 1s 0.26s ease both;
    }

    .nailong-plaque::before {
      content: "";
      position: absolute;
      inset: 7px;
      border: 1px solid rgba(255, 232, 165, 0.14);
      pointer-events: none;
      z-index: 2;
    }

    .nailong-plaque img {
      width: 100%;
      display: block;
      border-radius: 6px;
      filter: saturate(1.06) contrast(1.04) brightness(0.92);
    }

    .plaque-text {
      position: relative;
      padding: 12px 6px 8px;
      text-align: center;
      color: #fff1b7;
      font-size: clamp(20px, 7vw, 40px);
      line-height: 1.1;
      font-weight: 900;
      text-shadow:
        0 0 8px rgba(255, 236, 173, 0.9),
        0 0 24px rgba(255, 187, 43, 0.7),
        0 5px 16px #000;
      animation: titlePulse 2.7s ease-in-out infinite;
      z-index: 3;
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 14px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 225, 132, 0.32), transparent 24%),
        radial-gradient(circle at 50% 34%, rgba(231, 176, 70, 0.28), transparent 34%),
        linear-gradient(180deg, rgba(5, 4, 3, 0.84), rgba(19, 11, 3, 0.98));
      backdrop-filter: blur(4px);
    }

    .overlay-gate,
    .overlay-halo,
    .overlay-rays {
      position: absolute;
      pointer-events: none;
    }

    .overlay-gate {
      top: 0;
      bottom: 0;
      width: 14vw;
      min-width: 34px;
      background:
        linear-gradient(180deg, rgba(255, 230, 167, 0.12), rgba(122, 74, 10, 0.46)),
        linear-gradient(90deg, rgba(255, 240, 190, 0.22), rgba(255, 220, 126, 0.05) 20%, rgba(0, 0, 0, 0) 70%);
      box-shadow: inset 0 0 0 1px rgba(255, 227, 151, 0.18), 0 0 28px rgba(255, 193, 72, 0.10);
      opacity: 0.88;
    }

    .overlay-gate-left { left: 0; }
    .overlay-gate-right {
      right: 0;
      transform: scaleX(-1);
    }

    .overlay-halo {
      width: min(78vw, 360px);
      aspect-ratio: 1;
      border-radius: 50%;
      left: 50%;
      top: 8%;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(255, 230, 154, 0.28), rgba(255, 196, 64, 0.10) 40%, transparent 70%);
      filter: blur(4px);
      animation: haloPulseCenter 3.4s ease-in-out infinite;
    }

    .overlay-rays {
      inset: 0;
      background:
        conic-gradient(from 180deg at 50% 18%, rgba(255, 221, 141, 0) 0deg, rgba(255, 221, 141, 0.16) 18deg, rgba(255, 221, 141, 0) 38deg, rgba(255, 221, 141, 0.12) 52deg, rgba(255, 221, 141, 0) 74deg, rgba(255, 221, 141, 0.08) 92deg, rgba(255, 221, 141, 0) 120deg, rgba(255, 221, 141, 0.12) 140deg, rgba(255, 221, 141, 0) 180deg, rgba(255, 221, 141, 0.12) 220deg, rgba(255, 221, 141, 0) 260deg, rgba(255, 221, 141, 0.16) 310deg, rgba(255, 221, 141, 0) 360deg);
      opacity: 0.34;
      animation: slowRotate 22s linear infinite;
    }

    .modal {
      position: relative;
      z-index: 2;
      width: min(92vw, 380px);
      padding: 30px 18px 20px;
      text-align: center;
      color: #ffe9b7;
      border: 1px solid rgba(255, 222, 146, 0.52);
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 232, 166, 0.18), transparent 30%),
        linear-gradient(180deg, rgba(255, 223, 145, 0.14), transparent 52%),
        rgba(11, 8, 5, 0.95);
      box-shadow:
        inset 0 0 0 1px rgba(255, 242, 198, 0.07),
        0 22px 56px rgba(0, 0, 0, 0.76),
        0 0 48px rgba(221, 158, 55, 0.24);
      overflow: hidden;
      animation: riseIn 0.8s ease both;
    }

    .modal::before {
      content: "";
      position: absolute;
      inset: 9px;
      border: 1px solid rgba(255, 216, 130, 0.14);
      pointer-events: none;
    }

    .modal::after {
      content: "";
      position: absolute;
      inset: -40% -70%;
      background: linear-gradient(115deg, transparent 42%, rgba(255, 244, 201, 0.24) 50%, transparent 58%);
      transform: translateX(-65%);
      animation: imageShine 7.6s ease-in-out infinite;
      pointer-events: none;
    }

    .modal-icon {
      width: 68px;
      height: 68px;
      border: 1px solid rgba(255, 226, 148, 0.68);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      color: #fff0b9;
      font-size: 34px;
      font-weight: 200;
      background: radial-gradient(circle, rgba(255, 216, 116, 0.30), rgba(255, 210, 98, 0.05) 64%);
      box-shadow: 0 0 28px rgba(255, 204, 86, 0.34), 0 0 54px rgba(255, 189, 53, 0.14);
      text-shadow: 0 0 12px rgba(255, 220, 135, 0.85);
      animation: haloPulseScale 2.8s ease-in-out infinite;
    }

    .modal-msg {
      position: relative;
      z-index: 1;
      margin-bottom: 22px;
      color: rgba(255, 238, 199, 0.92);
      font-size: 14px;
      line-height: 1.9;
      text-shadow: 0 0 16px rgba(255, 200, 86, 0.14);
    }

    .modal-footer {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .btn-ok {
      width: 100%;
      min-height: 48px;
      border: 1px solid rgba(255, 234, 166, 0.75);
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      color: #1b1004;
      font-size: 17px;
      font-weight: 800;
      background: linear-gradient(180deg, #fff0ba, #d59b2b 56%, #7d4f0f);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.38), 0 0 24px rgba(255, 207, 93, 0.36);
    }

    .btn-ok:active { transform: translateY(1px); opacity: 0.86; }

    .spark {
      position: fixed;
      top: -12px;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #ffe8a6;
      box-shadow: 0 0 12px #ffd16a, 0 0 24px rgba(255, 193, 67, 0.64);
      pointer-events: none;
      z-index: 2;
      animation: fall linear forwards;
    }

    @keyframes curtainOpen {
      0% { opacity: 1; clip-path: inset(0 0 0 0); }
      65% { opacity: 1; clip-path: inset(0 47% 0 47%); }
      100% { opacity: 0; visibility: hidden; clip-path: inset(0 50% 0 50%); }
    }

    @keyframes divineDust {
      from { background-position: 0 0, 0 0, 0 0, 0 0; }
      to { background-position: 70px 230px, -90px 180px, 100px 270px, -120px 230px; }
    }

    @keyframes streamSweep {
      0%, 100% { transform: translateX(-45%); opacity: 0.28; }
      45%, 60% { transform: translateX(38%); opacity: 0.72; }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(20px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes titlePulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.18); }
    }

    @keyframes haloPulseCenter {
      0%, 100% { transform: translateX(-50%) scale(0.96); opacity: 0.72; }
      50% { transform: translateX(-50%) scale(1.06); opacity: 0.98; }
    }

    @keyframes haloPulseScale {
      0%, 100% { transform: scale(0.96); opacity: 0.78; }
      50% { transform: scale(1.06); opacity: 1; }
    }

    @keyframes imageGlowSoft {
      0%, 100% { box-shadow: 0 18px 44px rgba(0, 0, 0, 0.66), 0 0 28px rgba(255, 193, 64, 0.22); }
      50% { box-shadow: 0 20px 52px rgba(0, 0, 0, 0.72), 0 0 40px rgba(255, 205, 88, 0.30); }
    }

    @keyframes imageShine {
      0%, 35% { transform: translateX(-82%); }
      60%, 100% { transform: translateX(82%); }
    }

    @keyframes slowRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes fall {
      from { transform: translate3d(0, -10px, 0) scale(0.7); opacity: 0; }
      12% { opacity: 1; }
      to { transform: translate3d(var(--drift), 110vh, 0) scale(1.3); opacity: 0; }
    }

    @media (min-width: 480px) {
      #main-content { padding: 18px 12px 50px; }
      .subtitle { max-width: 380px; font-size: 14px; }
      .content-text { padding: 28px 20px 20px; font-size: 15px; }
      .image-wrapper { width: min(64%, 390px); }
      .nailong-plaque { width: min(58%, 320px); }
      .modal { width: min(88vw, 400px); padding: 34px 22px 22px; }
      .modal-msg { font-size: 15px; }
    }

    @media (min-width: 760px) {
      #main-content { padding-top: 24px; }
      .hero-title { padding-top: 24px; }
      .eyebrow { font-size: 12px; letter-spacing: 6px; text-indent: 6px; }
      h1::before,
      h1::after { width: min(18vw, 130px); }
      h1::before { right: calc(100% + 14px); }
      h1::after { left: calc(100% + 14px); }
      .subtitle { max-width: 500px; font-size: 14px; }
      .content-text { width: min(96%, 760px); padding: 32px 24px 22px; font-size: 16px; line-height: 2.16; }
      .content-text p:first-child { font-size: 18px; }
      .image-wrapper { width: min(54%, 430px); }
      .nailong-plaque { width: min(46%, 360px); }
      .overlay-gate { width: 18vw; min-width: 72px; }
      .modal { width: min(88vw, 420px); padding: 44px 28px 28px; }
      .modal-icon { width: 82px; height: 82px; font-size: 42px; margin-bottom: 22px; }
      .modal-msg { font-size: 16px; margin-bottom: 28px; }
      .btn-ok { width: auto; min-width: 154px; }
    }
  </style>
</head>
<body>
<div class="gold-streams"></div>
<div class="light-curtain" id="light-curtain"></div>

<div id="main-content">
  <div class="god-shell">
    <header class="hero-title">
      <div class="eyebrow">Divine Dominion</div>
      <h1>我已成神</h1>
      <p class="subtitle">凡尘低语终将熄灭，唯有神谕在暗金长夜中加冕。</p>
    </header>

    <div class="content-text">
      <p>我已成神。神是孤独的，自出生起不被凡人理解；我做的一切选择，凡人都不会理解。神注定孤独一生，凡人的孤独只是寂寞罢了。</p>
      <p>不必问我叫什么、姓什么、年龄多少。神是空无的，神本无相；神是自由的，神不被任何琐事拘束；神是超越一切的，凡人不配理解神。</p>
      <p>神注定孤独<br>神于凡人不同</p>
      <p>神不会痛苦，神不会难过，神不会语塞，神不会哭泣，神不会心碎，神不会沉沦，神不会妥协，神不会迷茫，神不会后悔，神不会回头，神不会等待，神不会动情，神不会迷失本心。神注定孤独。</p>
    </div>

    <div class="image-wrapper">
      <img src="./photo.jpg" alt="神">
      <div class="image-banner">我已成神</div>
    </div>

    <section class="nailong-plaque">
      <img src="./nailong.jpg" alt="奶龙">
      <div class="plaque-text">奶龙大王牛逼</div>
    </section>
  </div>
</div>

<div id="overlay">
  <div class="overlay-gate overlay-gate-left"></div>
  <div class="overlay-gate overlay-gate-right"></div>
  <div class="overlay-halo"></div>
  <div class="overlay-rays"></div>
  <div class="modal">
    <div class="modal-icon">!</div>
    <div class="modal-msg">神要与你交流</div>
    <div class="modal-footer">
      <button class="btn-ok" onclick="onConfirm()">确定</button>
    </div>
  </div>
</div>

<audio id="bgm" loop>
  <source src="./music.mp3" type="audio/mpeg">
</audio>

<script>
  function onConfirm() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    document.getElementById('light-curtain').style.display = 'block';
    document.getElementById('bgm').play().catch(() => {});
    beginSparks();
  }

  function beginSparks() {
    if (window.__sparkTimer) return;
    window.__sparkTimer = setInterval(() => {
      const spark = document.createElement('i');
      spark.className = 'spark';
      spark.style.left = Math.random() * 100 + 'vw';
      spark.style.setProperty('--drift', (Math.random() * 96 - 48) + 'px');
      spark.style.animationDuration = (4.6 + Math.random() * 5.2) + 's';
      spark.style.opacity = 0.4 + Math.random() * 0.45;
      spark.style.width = spark.style.height = (2 + Math.random() * 2.6) + 'px';
      document.body.appendChild(spark);
      setTimeout(() => spark.remove(), 10000);
    }, 180);
  }
</script>
